{% extends 'accounts/base.html' %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="flex justify-center items-start pt-12 min-h-[50vh]">
    <div class="bg-white rounded-lg shadow-xl border border-gray-100 max-w-md w-full p-6 text-center">
        
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
            <i class="fa-solid fa-triangle-exclamation text-3xl text-red-600"></i>
        </div>

        <h2 class="text-xl font-bold text-gray-900 mb-2">Delete this book?</h2>
        
        <p class="text-gray-500 mb-6">
            Are you sure you want to delete <strong>"{{ book.title }}"</strong>? 
            <br>
            This action cannot be undone and will remove the book from the inventory permanently.
        </p>

        <form method="post" class="flex flex-col sm:flex-row gap-3 justify-center">
            {% csrf_token %}
            
            <a href="{% url 'book_detail' book.pk %}" class="w-full inline-flex justify-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition">
                Cancel
            </a>
            
            <button type="submit" class="w-full inline-flex justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition">
                Yes, Delete it
            </button>
        </form>
    </div>
</div>
{% endblock %}
