{% extends 'accounts/base.html' %}
{% block title %}Process Return{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white shadow-lg rounded-xl overflow-hidden border border-gray-100">
        <div class="px-8 py-6 bg-blue-50 border-b border-blue-100">
            <h2 class="text-xl font-bold text-gray-900">Return: {{ borrow_record.book.title }}</h2>
            <p class="text-sm text-gray-600 mt-1">Borrowed by {{ borrow_record.member.user.get_full_name }}</p>
        </div>
        
        <div class="p-8">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                        {{ field.label }}
                    </label>
                    <div class="mt-1">{{ field }}</div>
                </div>
                {% endfor %}

                <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100 mt-6">
                    <a href="{% url 'borrow_list' %}" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition">Cancel</a>
                    <button type="submit" class="px-6 py-2 bg-blue-600 border border-transparent rounded-md text-sm font-medium text-white hover:bg-blue-700 transition">Confirm Return</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    input[type="date"], textarea {
        display: block; width: 100%; padding: 0.625rem 0.75rem; font-size: 0.875rem;
        border: 1px solid #d1d5db; border-radius: 0.375rem; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
    }
    input[type="date"]:focus, textarea:focus {
        outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
</style>
{% endblock %}
